name: KlipCam CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # =============================================================================
  # CODE QUALITY & TESTING
  # =============================================================================
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type checking
        run: npm run type-check

      - name: Linting
        run: npm run lint

      - name: Code formatting check
        run: npm run format:check

      - name: Security audit
        run: npm audit --audit-level high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: klipcam_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: npm run db:setup:test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/klipcam_test
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/klipcam_test
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.TEST_CLERK_SECRET_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.TEST_REPLICATE_API_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.TEST_STRIPE_SECRET_KEY }}

  # =============================================================================
  # SECURITY SCANNING
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # =============================================================================
  # BUILD & PREVIEW DEPLOYMENT
  # =============================================================================
  build-preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [unit-tests, integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Preview
        id: preview-deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "PREVIEW_URL=$url" >> $GITHUB_OUTPUT

      - name: Run E2E tests against preview
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ steps.preview-deploy.outputs.PREVIEW_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed successfully!**
              
              **Preview URL:** ${{ steps.preview-deploy.outputs.PREVIEW_URL }}
              
              **Changes:**
              - All tests passed ✅
              - Security scan completed ✅  
              - E2E tests passed ✅
              
              *This preview will be available for 24 hours.*`
            });

  # =============================================================================
  # PRODUCTION DEPLOYMENT
  # =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [unit-tests, integration-tests, security-scan]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Production
        id: production-deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "PRODUCTION_URL=$url" >> $GITHUB_OUTPUT

      - name: Run database migrations
        run: npm run migrate:prod
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Warm up critical endpoints
        run: |
          curl -f ${{ steps.production-deploy.outputs.PRODUCTION_URL }}/api/health
          curl -f ${{ steps.production-deploy.outputs.PRODUCTION_URL }}/api/jobs
        continue-on-error: true

      - name: Run production smoke tests
        run: npm run test:smoke
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ steps.production-deploy.outputs.PRODUCTION_URL }}

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: success
          text: |
            🚀 **KlipCam deployed successfully to production!**
            
            **Deployment:** ${{ github.sha }}
            **URL:** ${{ steps.production-deploy.outputs.PRODUCTION_URL }}
            **Deployed by:** ${{ github.actor }}
            
            All tests passed and system is healthy ✅
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: failure
          text: |
            🚨 **KlipCam production deployment failed!**
            
            **Deployment:** ${{ github.sha }}
            **Failed step:** ${{ job.status }}
            **Deployed by:** ${{ github.actor }}
            
            Please check the GitHub Actions logs and respond immediately.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =============================================================================
  # POST-DEPLOYMENT MONITORING
  # =============================================================================
  post-deployment-checks:
    name: Post-Deployment Monitoring
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: deploy-production
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Check system health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://klipcam.com/api/health)
          if [ $response -ne 200 ]; then
            echo "Health check failed with status code: $response"
            exit 1
          fi

      - name: Check database connectivity
        run: |
          response=$(curl -s -f https://klipcam.com/api/health | jq -r '.checks.database.status')
          if [ "$response" != "healthy" ]; then
            echo "Database health check failed"
            exit 1
          fi

      - name: Check key endpoints
        run: |
          # Test authenticated endpoints (with valid session)
          endpoints=("/api/jobs" "/api/assets")
          for endpoint in "${endpoints[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://klipcam.com${endpoint}")
            if [ $status -ne 401 ] && [ $status -ne 200 ]; then
              echo "Endpoint $endpoint failed with unexpected status: $status"
              exit 1
            fi
          done

      - name: Monitor error rates
        run: |
          # This would integrate with your monitoring system
          # For now, we'll just check that the deployment is stable
          echo "Monitoring deployment stability for next 5 minutes..."
          
      - name: Create deployment record
        run: |
          # Record successful deployment for tracking
          echo "Deployment completed at $(date)"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

  # =============================================================================
  # CLEANUP
  # =============================================================================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy-production, post-deployment-checks]
    steps:
      - name: Clean up temporary files
        run: |
          echo "Cleaning up temporary deployment files..."
          # Remove any temporary files or caches if needed

      - name: Update deployment status
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const { data: deployment } = await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              description: 'KlipCam deployment ${{ job.status }}',
              environment_url: 'https://klipcam.com'
            });

# =============================================================================
# SCHEDULED JOBS
# =============================================================================
  scheduled-security-scan:
    name: Scheduled Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run comprehensive security scan
        uses: securecodewarrior/github-action-add-sarif@v1
        with:
          sarif-file: 'security-scan-results.sarif'

      - name: Check for outdated dependencies
        run: |
          npm outdated --json > outdated-deps.json || true
          if [ -s outdated-deps.json ]; then
            echo "Outdated dependencies found - creating issue"
          fi

# Schedule weekly dependency updates
on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC